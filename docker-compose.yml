services:
  paradedb:
    image: paradedb/paradedb:0.23.0
    container_name: zaq-paradedb
    environment:
      POSTGRES_DB: zaq_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - paradedb_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zaq_prod"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
  zaq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zaq-app
    depends_on:
      paradedb:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      PHX_SERVER: "true"
      PORT: "4000"
      PHX_HOST: "localhost"
      DATABASE_URL: "${DATABASE_URL:-ecto://postgres:postgres@paradedb:5432/zaq_prod}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      # LLM, Embedding, Image-to-Text, and Ingestion settings are configured
      # via the back-office UI at /bo/system-config (persisted in the database).
      INGESTION_VOLUMES: "${INGESTION_VOLUMES:-documents}"
      INGESTION_VOLUMES_BASE: "${INGESTION_VOLUMES_BASE:-/zaq/volumes}"
      SYSTEM_CONFIG_ENCRYPTION_KEY: "${SYSTEM_CONFIG_ENCRYPTION_KEY}"
    volumes:
      - ./ingestion-volumes:/zaq/volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  paradedb_data:
