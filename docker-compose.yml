services:
  pgvector:
    image: pgvector/pgvector:pg18
    container_name: zaq-pgvector
    environment:
      POSTGRES_DB: zaq_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zaq_prod"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
  zaq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zaq-app
    depends_on:
      pgvector:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      PHX_SERVER: "true"
      PORT: "4000"
      PHX_HOST: "localhost"
      DATABASE_URL: "${DATABASE_URL:-ecto://postgres:postgres@pgvector:5432/zaq_prod}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      INGESTION_VOLUMES: "${INGESTION_VOLUMES:-documents}"
      INGESTION_VOLUMES_BASE: "${INGESTION_VOLUMES_BASE:-/zaq/volumes}"
      INGESTION_BASE_PATH: "${INGESTION_BASE_PATH:-/zaq/volumes/documents}"
      # Optional but recommended if your LLM/embedding server runs on host:
      LLM_ENDPOINT: "${LLM_ENDPOINT:-http://host.docker.internal:11434/v1}"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "${LLM_MODEL:-gpt-oss-120b}"
      EMBEDDING_ENDPOINT: "${EMBEDDING_ENDPOINT:-http://host.docker.internal:11434/v1}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-bge-multilingual-gemma2}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY}"
      IMAGE_TO_TEXT_API_URL: ${IMAGE_TO_TEXT_API_URL:-http://host.docker.internal:11434/v1}
      IMAGE_TO_TEXT_MODEL: ${IMAGE_TO_TEXT_MODEL:-pixtral-12b-2409}
      IMAGE_TO_TEXT_API_KEY: "${IMAGE_TO_TEXT_API_KEY}"
    volumes:
      - ./ingestion-volumes:/zaq/volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:
