name: E2E

on:
  push:
    branches-ignore:
      - main
      - release
      - "release/**"
  pull_request:
    branches-ignore:
      - main
      - release
      - "release/**"

jobs:
  e2e:
    name: Knowledge Ops E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zaq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      E2E: "1"
      PORT: "4002"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install inotify-tools
        run: sudo apt-get install -y inotify-tools

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.5"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: test/e2e/package-lock.json

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-e2e-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-e2e-
            ${{ runner.os }}-mix-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Install E2E dependencies
        run: npm ci --prefix test/e2e

      - name: Install Playwright browser
        run: npx --prefix test/e2e playwright install --with-deps chromium

      - name: Run Knowledge Ops E2E journeys
        run: npm --prefix test/e2e run test:journeys

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test/e2e/playwright-report
            test/e2e/test-results
          if-no-files-found: ignore
