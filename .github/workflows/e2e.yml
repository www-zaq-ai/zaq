name: E2E

on:
  pull_request:
    branches:
      - main

jobs:
  e2e:
    name: User Journeys QA (${{ matrix.shard }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        shard: ["1/2", "2/2"]

    services:
      postgres:
        image: paradedb/paradedb:0.23.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zaq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      E2E: "1"
      PORT: "4002"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install inotify-tools
        run: sudo apt-get install -y inotify-tools

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.5"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: test/e2e/package-lock.json

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-e2e-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-e2e-
            ${{ runner.os }}-mix-

      - name: Restore asset build cache
        id: assets-cache
        uses: actions/cache@v4
        with:
          path: priv/static
          key: ${{ runner.os }}-assets-${{ hashFiles('assets/**') }}

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Install asset tooling
        run: mix assets.setup

      - name: Build frontend assets
        if: steps.assets-cache.outputs.cache-hit != 'true'
        run: mix assets.build

      - name: Install E2E dependencies
        run: npm ci --prefix test/e2e

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('test/e2e/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx --prefix test/e2e playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browser)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx --prefix test/e2e playwright install-deps chromium

      - name: Run E2E suite (shard ${{ matrix.shard }})
        run: npm --prefix test/e2e run test -- --shard=${{ matrix.shard }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ strategy.job-index }}
          path: |
            test/e2e/playwright-report
            test/e2e/test-results
          if-no-files-found: ignore
