name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

jobs:
  release:
    name: Create release PR or publish release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker:
    name: Build and push release image
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image_tags
        run: |
          set -euo pipefail

          VERSION="${{ needs.release.outputs.version }}"
          MAJOR="${VERSION%%.*}"
          REMAINDER="${VERSION#*.}"
          MINOR="${REMAINDER%%.*}"
          IMAGE_REPO="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${IMAGE_REPO}"

          TAGS=(
            "${IMAGE}:v${VERSION}"
            "${IMAGE}:${VERSION}"
            "${IMAGE}:${MAJOR}.${MINOR}"
            "${IMAGE}:${MAJOR}"
          )

          if [[ "${VERSION}" != *-* ]]; then
            TAGS+=("${IMAGE}:latest")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}

      - name: Verify multi-arch manifest
        run: |
          set -euo pipefail

          VERSION="${{ needs.release.outputs.version }}"
          IMAGE_REPO="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${IMAGE_REPO}:v${VERSION}"

          INSPECT_OUTPUT="$(docker buildx imagetools inspect "${IMAGE}")"
          echo "${INSPECT_OUTPUT}"

          [[ "${INSPECT_OUTPUT}" == *"linux/amd64"* ]]
          [[ "${INSPECT_OUTPUT}" == *"linux/arm64"* ]]

  docs_build:
    name: Build docs for release
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MIX_ENV: docs
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.5"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-docs-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-docs-

      - name: Install dependencies
        run: mix deps.get

      - name: Build docs
        run: mix docs --warnings-as-errors

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc

  docs_deploy:
    name: Deploy docs to GitHub Pages
    needs:
      - release
      - docs_build
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  enrich_release:
    name: Enrich GitHub release notes
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      TAG: ${{ needs.release.outputs.tag_name }}
      RELEASE_SUMMARY_MODEL: ${{ vars.RELEASE_SUMMARY_MODEL || 'openrouter/openai/gpt-oss-120b:free' }}
      OPENROUTER_API_KEY: ${{ secrets.RELEASE_SUMMARY_API_KEY || secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.sha }}
          fetch-depth: 0

      - name: Prepare release context
        run: |
          set -euo pipefail

          git fetch --force --tags

          RELEASE_JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}")
          RELEASE_ID=$(jq -r '.id' <<<"${RELEASE_JSON}")
          jq -r '.body // ""' <<<"${RELEASE_JSON}" > release-body.md
          echo "${RELEASE_ID}" > release-id.txt

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          echo "${PREVIOUS_TAG}" > previous-tag.txt

          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');

          const repo = process.env.REPO;
          const tag = process.env.TAG;
          const previousTag = fs.readFileSync('previous-tag.txt', 'utf8').trim();
          const range = previousTag ? `${previousTag}..${tag}` : tag;

          const counts = new Map();

          const addContributor = (display, subject) => {
            if (!display || /^chore\(main\): release\b/i.test(subject)) return;
            counts.set(display, (counts.get(display) || 0) + 1);
          };

          const fallbackDisplay = (name, email) => {
            const noreply = email.match(/^(?:\d+\+)?([^@]+)@users\.noreply\.github\.com$/i);
            return noreply ? `@${noreply[1]}` : name;
          };

          if (previousTag) {
            const compare = execFileSync(
              'gh',
              ['api', '--paginate', `repos/${repo}/compare/${previousTag}...${tag}`, '--jq', '.commits[] | @base64'],
              { encoding: 'utf8' }
            );

            for (const line of compare.split('\n')) {
              if (!line.trim()) continue;
              const commit = JSON.parse(Buffer.from(line, 'base64').toString('utf8'));
              const login = commit.author && commit.author.login;
              const name = commit.commit && commit.commit.author && commit.commit.author.name;
              const email = commit.commit && commit.commit.author && commit.commit.author.email || '';
              const subject = (commit.commit && commit.commit.message || '').split('\n')[0].trim();
              const display = login ? `@${login}` : fallbackDisplay(name, email);

              addContributor(display, subject);
            }
          }

          if (!counts.size) {
            const raw = execFileSync('git', ['log', range, '--format=%an%x00%ae%x00%s%x00'], {
              encoding: 'utf8',
            });

            const parts = raw.split('\0');
            for (let index = 0; index + 2 < parts.length; index += 3) {
              const name = parts[index].trim();
              const email = parts[index + 1].trim();
              const subject = parts[index + 2].trim();
              const display = fallbackDisplay(name, email);

              addContributor(display, subject);
            }
          }

          const rows = [...counts.entries()]
            .sort((left, right) => right[1] - left[1] || left[0].localeCompare(right[0]))
            .map(([author, count]) => `* ${author}: ${count} ${count === 1 ? 'commit' : 'commits'}`);

          const contributors = rows.length
            ? ['---', '', '### Contributors', '', ...rows, ''].join('\n')
            : '';

          fs.writeFileSync('contributors.md', contributors);

          const body = fs.readFileSync('release-body.md', 'utf8').trim();
          const prompt = [
            'Write a concise, user-facing summary for this ZAQ release.',
            'Use 3-5 short bullets or compact paragraphs in Markdown.',
            'Do not include a title, contributor list, changelog heading, or release version.',
            'Do not copy the grouped changelog verbatim; synthesize the user impact.',
            'Base the summary only on the release notes below.',
            '',
            '<release_notes>',
            body,
            '</release_notes>',
          ].join('\n');

          fs.writeFileSync('release-summary-prompt.md', prompt);
          NODE

      - name: Generate release summary
        id: release_summary
        continue-on-error: true
        run: |
          set -euo pipefail

          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "Release summary API key is not configured; skipping summary generation"
            : > summary.md
            exit 0
          fi

          npm install -g opencode-ai@latest

          opencode run \
            --model "${RELEASE_SUMMARY_MODEL}" \
            --agent plan \
            < release-summary-prompt.md > summary.md

      - name: Patch GitHub release body
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');

          const summaryStart = '<!-- zaq-release-summary:start -->';
          const summaryEnd = '<!-- zaq-release-summary:end -->';
          const contributorsStart = '<!-- zaq-release-contributors:start -->';
          const contributorsEnd = '<!-- zaq-release-contributors:end -->';

          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const stripBlock = (body, start, end) => {
            const pattern = new RegExp(`\\n*${escapeRegExp(start)}[\\s\\S]*?${escapeRegExp(end)}\\n*`, 'g');
            return body.replace(pattern, '\n\n').trim();
          };

          const body = stripBlock(
            stripBlock(fs.readFileSync('release-body.md', 'utf8').trim(), summaryStart, summaryEnd),
            contributorsStart,
            contributorsEnd
          );
          const summary = fs.existsSync('summary.md') ? fs.readFileSync('summary.md', 'utf8').trim() : '';
          const contributors = fs.readFileSync('contributors.md', 'utf8').trim();

          let nextBody = body;
          if (summary) {
            const lines = body.split('\n');
            const firstLine = lines.shift() || '';
            const rest = lines.join('\n').trim();
            const summaryBlock = [
              summaryStart,
              '',
              '📝 **Summary**',
              '',
              summary,
              '',
              '---',
              '',
              summaryEnd,
            ].join('\n');

            nextBody = [firstLine, '', summaryBlock, '', rest].filter(Boolean).join('\n');
          }

          if (contributors) {
            nextBody = [
              nextBody.trim(),
              '',
              contributorsStart,
              contributors,
              contributorsEnd,
            ].join('\n');
          }

          fs.writeFileSync('enriched-release-body.md', `${nextBody.trim()}\n`);
          NODE

          RELEASE_ID=$(cat release-id.txt)
          gh api \
            --method PATCH \
            "repos/${REPO}/releases/${RELEASE_ID}" \
            --field body=@enriched-release-body.md

  notify_discord:
    name: Post release changelog to Discord
    needs:
      - release
      - enrich_release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ needs.release.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          BODY=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.body // ""')
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          DESC="${BODY}"

          # Trim to Discord embed description limit (4096 chars)
          DESC="${DESC:0:4000}"

          PAYLOAD=$(jq -n \
            --arg title "🚀 ZAQ ${TAG} is out!" \
            --arg desc "${DESC}" \
            --arg url "${RELEASE_URL}" \
            '{
              username: "Release Bot",
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5814783,
                footer: { text: "See the full release on GitHub" }
              }]
            }')

          curl -fsSL -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
