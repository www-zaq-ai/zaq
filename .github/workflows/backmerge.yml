name: Backmerge Main into Dev

on:
  push:
    branches:
      - main

jobs:
  backmerge:
    name: Open backmerge PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open backmerge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base dev \
            --head main \
            --title "chore: backmerge main into dev" \
            --body "Automated backmerge after release. Merge this to keep dev in sync with main." \
            || echo "PR already exists or branches are in sync"